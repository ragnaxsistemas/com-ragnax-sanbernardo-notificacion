      max-file-size: 50MB
      max-request-size: 50MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
  use-fqn: true


server:
  port: 9999

logging:
  file:
    name: logfile
    path: /
management:
  endpoint:
    import jakarta.persistence.s:
      enabled: true
    metrics:
      enabled: true
    health:
      show-details: always
  endpoints:
    web:
      base-path: /actuator/${spring.application.name}
      exposure:
        include: logfile,health

