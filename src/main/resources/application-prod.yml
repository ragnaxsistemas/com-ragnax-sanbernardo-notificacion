    description: '@project.description@'
    encoding: '@project.build.sourceEncoding@'
    java:
      version: '@java.version@'
    name: '@project.name@'
    version: '@project.version@'

spring:
  profiles:
    active: dev
  application:
    name: com-ragnax-sanbernado-notificacion
  datasource:
    url: jdbc:mysql://localhost:3306/imsb?useSSL=false
    username: root
    password: m3R0b0L4sT4s4sD3lTr4b4j0
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
