spring:
  application:
    name: com-ragnax-sanbernardo-notificacion
  hikari:
    maximum-pool-size: 10
    minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
  servlet:
    multipart:
      max-file-size: 110MB
      max-request-size: 110MB
  mail:
    # 🚩 Reemplaza por el Host DNS real del servidor Kerio de la muni (ej: mail.sanbernardo.cl)
    host: correo.sanbernardo.cl
    port: 465
    username: sistema.cartas@sanbernardo.cl
    password: "Arboleda4431.," # 🚩 Importante ponerlo entre comillas por el punto y la coma al final
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          # Kerio con puerto 465 prefiere SSL directo en lugar de forzar un Upgrade por STARTTLS
          starttls:
            enable: false
          # Parámetros estrictos para el Socket SSL seguro
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
  # La contraseña es la API Key que generaste (incluyendo el 're_')

